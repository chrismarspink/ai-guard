<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>innoecm-ai-guard 설정</title>
  <style>
    body { font-family: sans-serif; margin: 2rem auto; max-width: 560px; color: #202124; line-height: 1.5; }
    h1 { font-size: 1.2rem; }
    .card { border: 1px solid #e0e0e0; border-radius: 10px; padding: 1.1rem 1.3rem; margin-top: 1rem; }
    .row { display: flex; align-items: flex-start; gap: 0.6rem; }
    .row input { margin-top: 0.2rem; }
    .muted { color: #5f6368; font-size: 0.9rem; }
    .status { margin-top: 0.8rem; font-size: 0.9rem; }
    .status.on { color: #137333; }
    .status.off { color: #5f6368; }
    .org-off { color: #b06000; font-size: 0.9rem; margin-top: 0.6rem; }
    code { background: #f1f3f4; border-radius: 3px; padding: 0.05rem 0.3rem; }
  </style>
</head>
<body>
  <h1>innoecm-ai-guard 설정</h1>
  <p class="muted">
    이 확장은 회사 보안 정책(DLP)에 따라 LLM 사이트로 나가는 민감정보를 점검합니다.
    <strong>기기 정보(OS·브라우저)</strong>는 준수 관리를 위해 항상 수집됩니다.
    <strong>계정(이메일)</strong>은 아래에 동의하신 경우에만 수집됩니다.
  </p>

  <div class="card">
    <div class="row">
      <input type="checkbox" id="consent" />
      <label for="consent">
        <strong>내 계정(이메일) 수집에 동의합니다.</strong><br />
        <span class="muted">동의 시 로그인된 계정 이메일이 감사 로그에 함께 기록되어,
        보안팀이 "누가" 민감정보를 다뤘는지 식별할 수 있습니다. 언제든지 해제할 수 있습니다.</span>
      </label>
    </div>
    <div id="status" class="status off">현재: 계정 미수집 (기기 정보만 수집)</div>
    <div id="org-off" class="org-off" hidden>※ 조직 정책이 계정 수집을 비활성화했습니다. 동의해도 수집되지 않습니다.</div>
  </div>

  <script type="module" src="./options.js"></script>
</body>
</html>
